<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Audio Player with Clock</title>
  <style>
    /* Base styles for a dark theme */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      background-color: #121212;
      color: #e0e0e0;
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Clock style */
    #ampm {
      font-family: 'Helvetica', monospace;
      font-size: clamp(1rem, 2.5vmin, 1.5rem);
      color: #cfcfcf;
      transition: font-size 0.3s ease;
      display: inline;
    }
    
    #clock {
      font-size: 100px;
      font-weight: bold;
      display: inline;
      text-transform: uppercase;
      letter-spacing: -1px;
      animation: fadein 3s;
      -moz-animation: fadein 3s;
      -webkit-animation: fadein 3s;
      -o-animation: fadein 3s;
      font-family: 'Helvetica', sans-serif;
      -webkit-text-stroke: 2px #fff;
      color: #fff;
      opacity: 0.8;
      transition: font-size 0.4s ease;
      line-height: 1;
      white-space: nowrap;
    }

    /* Date display style */
    #dateDisplay {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #e0e0e0;
    }

    .timeoneliner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      margin: 0 5vw;
      gap: 10px;
      width: auto;
    } 

    .statusbar {
      position: relative;
      background-color: #1a1a1a;
      border-top: 1px solid #333;
      padding: 10px 5vw;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .statusbar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .statusbar-icon {
      font-size: 1.2rem;
      line-height: 1;
      cursor: default;
      user-select: none;
    }

    .statusbar-toggle {
      position: absolute;
      top: -28px;
      right: 5vw;
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px 4px 0 0;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
      transition: background-color 0.2s ease;
    }

    .statusbar-toggle:hover {
      background-color: #383838;
    }

    .statusbar.collapsed .statusbar-row {
      display: none;
    }

    .statusbar.collapsed {
      padding-bottom: 6px;
    }

    #customPlayer button {
      font-size: 1rem;
      padding: 6px 12px;
      background: #333;
      color: #e0e0e0;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      height: auto;
      max-height: none;
      min-width: 42px;
    }

    #customPlayer button:hover {
      background-color: #444;
    }

    #customPlayer input[type="range"] {
      accent-color: #888;
      height: 4px;
      cursor: pointer;
    }

    #timeDisplay {
      font-variant-numeric: tabular-nums;
    }

    /* Responsive height for audio player, dropdown, and button */
    #audioPlayer {
      flex: 1; /* Take remaining space */
      color-scheme: dark; /* Enforce dark color scheme for the audio player */
      background-color: #333; /* Dark background for audio controls */
      color: #e0e0e0; /* Light text for track info */
      border: 2px solid #444;
      border-radius: 5px;
      padding: 5px;
      height: 4vw; /* Responsive height: half of viewport width */
      max-height: 100px; /* Cap maximum height for better appearance on large screens */
    }

    /* Ensure the dropdown and play button match the audio player height */
    select, button {
      font-size: 1rem;
      padding: 8px 12px;
      color: #e0e0e0; /* Light text color */
      background-color: #333; /* Dark background for controls */
      border: none;
      border-radius: 5px;
      height: 38px;
      max-height: 38px;
      min-height: 38px;
    }

    select#renderMode {
      margin-top: 4px;
      height: auto;
      padding: 4px 10px;
      font-size: 0.85rem;
      background-color: #2a2a2a;
      border: 1px solid #444;
      cursor: pointer;
      appearance: auto;
      border-radius: 4px;
      width: auto;
      max-width: 220px;
      transition: background-color 0.2s ease;
    }

    select#renderMode:hover {
      background-color: #383838;
    }

    /* Button hover effect */
    button:hover, select:hover {
      background-color: #444;
    }

    /* Hide default audio controls and apply custom dark theme styling */
    #audioPlayer::-webkit-media-controls-panel {
      background-color: #333 !important; /* Dark background */
      color: #e0e0e0 !important; /* Light text color */
    }

    #audioPlayer::-webkit-media-controls-play-button,
    #audioPlayer::-webkit-media-controls-volume-slider,
    #audioPlayer::-webkit-media-controls-timeline,
    #audioPlayer::-webkit-media-controls-current-time-display,
    #audioPlayer::-webkit-media-controls-time-remaining-display {
      filter: invert(1) hue-rotate(180deg) brightness(1.2); /* Light icons for controls */
    }

    /* Equalizer canvas style */
    #equalizer {
      width: 100%;
      height: 8vw;
      max-height: 120px;
      margin-top: 10px;
      margin-bottom: 20px;
      background: transparent;
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 0;
      display: block;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <main class="main-area">
    <!-- Real-time clock -->
    <div class="timeoneliner">
      <div style="position: relative; display: inline-flex; align-items: flex-start;">
        <div id="clock">00&middot;00&middot;00</div>
        <span id="ampm" style="margin-left: 4px; margin-top: 0.1em; vertical-align: super; line-height: 1;">mm</span>
      </div>
      <canvas id="equalizer"></canvas>
      <select id="renderMode" onchange="setRenderMode(this.value)">
        <option value="bars">Bars</option>
        <option value="gradientBars">Gradient Bars</option>
        <option value="gridBlocks">Grid Blocks</option>
        <option value="gridPeakBlocks">Grid Peak Hold</option>
        <option value="mirrorBars">Mirror Bars</option>
        <option value="peakBars">Peak Hold Bars</option>
        <option value="dotMatrix">Dot Matrix</option>
        <option value="line">Line</option>
        <option value="area">Area Chart</option>
        <option value="bezier">Bezier Curve</option>
        <option value="waveform">Waveform</option>
        <option value="circularWave">Circular Wave</option>
        <option value="filledBand">Filled Band</option>
        <option value="waterfall">Waterfall</option>
        <option value="terrain">Terrain</option>
        <option value="particles">Particles</option>
      </select>
    </div>

    <!-- Human-readable date display -->
    <div id="dateDisplay">Loading date...</div>
  </main>

  <footer class="statusbar" id="statusbar">
      <button class="statusbar-toggle" onclick="toggleStatusbar()" title="Toggle control panel">▲</button>
    <div class="statusbar-row">
      <span class="statusbar-icon" title="Radio Station">📻</span>
      <select id="audioSelector"></select>
      <button onclick="playAudio()" title="Play">▶</button>
      <button onclick="captureSystemAudio()" title="Capture Tab/Window Audio">🖥</button>
      <input type="file" id="fileInput" accept="audio/*" style="display:none" onchange="playLocalFile(this)">
      <button onclick="document.getElementById('fileInput').click()" title="Open Local File">📂</button>
    </div>
    <div class="statusbar-row">
      <span class="statusbar-icon" title="Player Mode">⚙</span>
      <select id="playerMode" onchange="setPlayerMode(this.value)" style="max-width:160px;">
        <option value="native">Native Player</option>
        <option value="custom">Custom Player</option>
        <option value="none">Buttons Only</option>
      </select>
    </div>
    <div class="statusbar-row" id="playerRow">
      <div id="customPlayer" style="display:none; align-items:center; gap:10px;">
        <button onclick="togglePlay()" title="Play/Pause" id="playPauseBtn">▶</button>
        <input type="range" id="seekBar" min="0" max="1000" value="0" step="1" style="width:140px;" title="Seek" oninput="onSeekChange()">
        <span id="timeDisplay" style="font-size:0.85rem; color:#e0e0e0; min-width:80px; text-align:center;">00:00 / 00:00</span>
        <input type="range" id="volumeBar" min="0" max="1" value="1" step="0.01" style="width:70px;" title="Volume" oninput="onVolumeChange()">
        <span class="statusbar-icon" title="Playback Speed">⏱</span>
        <select id="playbackRate" onchange="setPlaybackRate(this.value)" style="max-width:80px;">
          <option value="0.5">0.5x</option>
          <option value="0.75">0.75x</option>
          <option value="1" selected>1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </div>
      <audio id="audioPlayer" controls crossorigin="anonymous" style="flex:1; min-width:200px;"></audio>
    </div>
  </footer>

  <!-- JavaScript code -->
  <script src="script.js"></script>
</body>
</html>
